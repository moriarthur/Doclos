version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: doclos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: doclos
      POSTGRES_PASSWORD: doclos_dev_password
      POSTGRES_DB: doclos
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U doclos']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: doclos-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer for database management (optional, for development)
  adminer:
    image: adminer:latest
    container_name: doclos-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
